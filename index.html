<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Chart Project</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .chart {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chart img {
      width: 100%;
      border-radius: 8px;
    }

    .caption {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Clean Water & Sanitation</h1>

  <div class="grid">

    <div class="chart">
      <img src="chart1.png" alt="Chart 1">
      <div class="caption"></div>
    </div>

    <div class="chart">
      <img src="chart2.png" alt="Chart 2">
      <div class="caption"></div>
    </div>

    <div class="chart">
      <img src="chart3.png" alt="Chart 3">
      <div class="caption"></div>
    </div>

    <div class="chart">
      <img src="chart4.png" alt="Chart 4">
      <div class="caption"></div>
    </div>

    <div class="chart">
      <img src="chart5.png" alt="Chart 5">
      <div class="caption"></div>
    </div>

  </div>

</body>
</html>
